<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formularios Múltiples</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:#f4f6f9;
        display:flex;
        justify-content:center;
        align-items:flex-start; /* Permite el flujo natural hacia abajo */
        min-height:100vh;
        padding:40px 20px;
    }

    /* Contenedor para organizar todos los formularios */
    .contenedor-formularios {
        display: flex;
        flex-wrap: wrap;
        gap: 30px;
        justify-content: center;
        width: 100%;
        max-width: 1200px;
    }

    /* Clase general para cada tarjeta de formulario */
    .formulario-card {
        background:white;
        padding:40px;
        border-radius:15px;
        width:100%;
        max-width:380px; /* Tamaño ideal para cuadrícula */
        box-shadow:0 10px 25px rgba(0,0,0,0.08);
        flex: 1 1 350px; /* Responsivo: crece y se encoge según el espacio */
    }

    /* Estilo especial para que el de contacto sea un poco más ancho si hay espacio */
    .formulario-card.ancho-completo {
        max-width: 450px;
    }

    .formulario-card h2{
        text-align:center;
        margin-bottom:25px;
        color:#333;
        font-size: 24px;
    }

    .grupo{
        margin-bottom:20px;
    }

    label{
        display:block;
        margin-bottom:8px;
        color:#555;
        font-weight:bold;
        font-size: 14px;
    }

    input,
    textarea,
    select {
        width:100%;
        padding:12px;
        border:1px solid #ccc;
        border-radius:8px;
        outline:none;
        transition:0.3s;
        font-size:15px;
    }

    input:focus,
    textarea:focus,
    select:focus {
        border-color:#007bff;
        box-shadow:0 0 5px rgba(0,123,255,0.3);
    }

    textarea{
        resize:none;
        height:100px;
    }

    button{
        width:100%;
        padding:14px;
        border:none;
        background:#007bff;
        color:white;
        font-size:16px;
        border-radius:8px;
        cursor:pointer;
        transition:0.3s;
        font-weight: bold;
        margin-top: 5px;
    }

    button:hover{
        background:#0056b3;
    }

    @media(max-width:600px){
        .formulario-card{
            padding:25px;
        }
        body {
            padding: 20px 10px;
        }
    }
</style>
</head>

<body>

<div class="contenedor-formularios">

    <div class="formulario-card">
        <h2>Iniciar Sesión</h2>
        <form action="#" method="POST">
            <div class="grupo">
                <label for="login-correo">Correo electrónico</label>
                <input 
                    type="email" 
                    id="login-correo" 
                    name="login-correo" 
                    placeholder="usuario@correo.com"
                    required
                >
            </div>

            <div class="grupo">
                <label for="login-password">Contraseña</label>
                <input 
                    type="password" 
                    id="login-password" 
                    name="login-password" 
                    placeholder="Tu contraseña"
                    required
                >
            </div>

            <button type="submit">Ingresar</button>
        </form>
    </div>


    <div class="formulario-card">
        <h2>Crear Cuenta</h2>
        <form action="#" method="POST">
            <div class="grupo">
                <label for="reg-nombre">Nombre completo</label>
                <input 
                    type="text" 
                    id="reg-nombre" 
                    name="reg-nombre" 
                    placeholder="Juan Pérez"
                    required
                >
            </div>

            <div class="grupo">
                <label for="reg-correo">Correo electrónico</label>
                <input 
                    type="email" 
                    id="reg-correo" 
                    name="reg-correo" 
                    placeholder="ejemplo@correo.com"
                    required
                >
            </div>

            <div class="grupo">
                <label for="reg-password">Contraseña</label>
                <input 
                    type="password" 
                    id="reg-password" 
                    name="reg-password" 
                    placeholder="Mínimo 8 caracteres"
                    required
                >
            </div>

            <button type="submit">Registrarse</button>
        </form>
    </div>


    <div class="formulario-card ancho-completo">
        <h2>Contáctanos</h2>
        <form action="#" method="POST">
            <div class="grupo">
                <label for="con-nombre">Nombre</label>
                <input 
                    type="text" 
                    id="con-nombre" 
                    name="con-nombre" 
                    placeholder="Tu nombre"
                    required
                >
            </div>

            <div class="grupo">
                <label for="con-correo">Correo electrónico</label>
                <input 
                    type="email" 
                    id="con-correo" 
                    name="con-correo" 
                    placeholder="ejemplo@correo.com"
                    required
                >
            </div>

            <div class="grupo">
                <label for="con-mensaje">Mensaje</label>
                <textarea 
                    id="con-mensaje" 
                    name="con-mensaje" 
                    placeholder="Escribe tu mensaje..."
                    required
                ></textarea>
            </div>

            <button type="submit">Enviar mensaje</button>
        </form>
    </div>


    <div class="formulario-card">
        <h2>Boletín Informativo</h2>
        <form action="#" method="POST">
            <div class="grupo">
                <p style="color: #666; font-size: 14px; margin-bottom: 15px; text-align: center;">
                    Suscríbete para recibir las últimas noticias y actualizaciones directamente en tu correo.
                </p>
                <label for="sus-correo">Correo electrónico</label>
                <input 
                    type="email" 
                    id="sus-correo" 
                    name="sus-correo" 
                    placeholder="tu-email@correo.com"
                    required
                >
            </div>

            <button type="submit" style="background: #28a745;">Suscribirse</button> 
            </form>
    </div>

</div>

</body>
</html>
