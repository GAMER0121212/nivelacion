<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:#f4f6f9;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        padding:20px;
    }

    .contacto{
        background:white;
        padding:40px;
        border-radius:15px;
        width:100%;
        max-width:500px;
        box-shadow:0 10px 25px rgba(0,0,0,0.1);
    }

    .contacto h1{
        text-align:center;
        margin-bottom:25px;
        color:#333;
    }

    .grupo{
        margin-bottom:20px;
    }

    label{
        display:block;
        margin-bottom:8px;
        color:#555;
        font-weight:bold;
    }

    input,
    textarea{
        width:100%;
        padding:12px;
        border:1px solid #ccc;
        border-radius:8px;
        outline:none;
        transition:0.3s;
        font-size:16px;
    }

    input:focus,
    textarea:focus{
        border-color:#007bff;
        box-shadow:0 0 5px rgba(0,123,255,0.3);
    }

    textarea{
        resize:none;
        height:120px;
    }

    button{
        width:100%;
        padding:14px;
        border:none;
        background:#007bff;
        color:white;
        font-size:16px;
        border-radius:8px;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        background:#0056b3;
    }

    @media(max-width:500px){
        .contacto{
            padding:25px;
        }
    }
</style>
</head>

<body>

<div class="contacto">
    <h1>Contáctanos</h1>

    <form action="#" method="POST">

        <div class="grupo">
            <label for="nombre">Nombre</label>
            <input 
                type="text" 
                id="nombre" 
                name="nombre" 
                placeholder="Tu nombre"
                required
            >
        </div>

        <div class="grupo">
            <label for="correo">Correo electrónico</label>
            <input 
                type="email" 
                id="correo" 
                name="correo" 
                placeholder="ejemplo@correo.com"
                required
            >
        </div>

        <div class="grupo">
            <label for="mensaje">Mensaje</label>
            <textarea 
                id="mensaje" 
                name="mensaje" 
                placeholder="Escribe tu mensaje..."
                required
            ></textarea>
        </div>

        <button type="submit">Enviar mensaje</button>

    </form>
</div>

</body>
</html>
